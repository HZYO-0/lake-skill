name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      run: pytest -q

    - name: Create dist directory
      run: mkdir -p dist

    - name: Package skill
      run: cd skills/bondlens && zip -r ../../dist/skill.zip . -x "*.pyc" -x "__pycache__/*"

    - name: Generate checksums
      run: sha256sum dist/skill.zip > dist/skill.zip.sha256

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/skill.zip
          dist/skill.zip.sha256
        generate_release_notes: true
