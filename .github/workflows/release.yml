name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing or new release tag to create/update, for example v0.12.0
        required: true
        type: string
      ref:
        description: Code ref to package. Use main to backfill assets for an existing release.
        required: true
        default: main
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Normalize release inputs
      id: release_inputs
      shell: bash
      env:
        RAW_TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        RAW_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      run: |
        normalize_tag() {
          printf '%s' "$1" \
            | tr -d '\r' \
            | sed -E 's/^[[:space:]]*(tag_name|tag)[[:space:]]*=[[:space:]]*//; s/^[[:space:]]+//; s/[[:space:]]+$//'
        }
        normalize_ref() {
          printf '%s' "$1" \
            | tr -d '\r' \
            | sed -E 's/^[[:space:]]*ref[[:space:]]*=[[:space:]]*//; s/^[[:space:]]+//; s/[[:space:]]+$//'
        }
        tag_name="$(normalize_tag "$RAW_TAG_NAME")"
        ref="$(normalize_ref "$RAW_REF")"
        if [ -z "$tag_name" ] || printf '%s' "$tag_name" | grep -q '[[:space:]]'; then
          echo "::error::Invalid release tag: '$tag_name'"
          exit 1
        fi
        if [ -z "$ref" ]; then
          echo "::error::Invalid checkout ref: '$ref'"
          exit 1
        fi
        echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
        echo "ref=$ref" >> "$GITHUB_OUTPUT"

    - uses: actions/checkout@v4
      with:
        ref: ${{ steps.release_inputs.outputs.ref }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run linter
      run: ruff check .

    - name: Type check (advisory)
      run: mypy cli
      continue-on-error: true

    - name: Run tests
      run: pytest -q

    - name: Create dist directory
      run: mkdir -p dist

    - name: Package skill
      run: cd skills/lake-skill && zip -r ../../dist/skill.zip . -x "*.pyc" -x "__pycache__/*"

    - name: Generate checksums
      run: sha256sum dist/skill.zip > dist/skill.zip.sha256

    - name: Validate release tag exists
      shell: bash
      run: git ls-remote --exit-code --tags origin "refs/tags/${{ steps.release_inputs.outputs.tag_name }}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_inputs.outputs.tag_name }}
        files: |
          dist/skill.zip
          dist/skill.zip.sha256
        fail_on_unmatched_files: true
        overwrite_files: true
        generate_release_notes: true
