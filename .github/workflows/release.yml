name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing or new release tag to create/update, for example v0.12.0
        required: true
        type: string
      ref:
        description: Code ref to package. Use main to backfill assets for an existing release.
        required: true
        default: main
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run linter
      run: ruff check .

    - name: Type check (advisory)
      run: mypy cli
      continue-on-error: true

    - name: Run tests
      run: pytest -q

    - name: Create dist directory
      run: mkdir -p dist

    - name: Package skill
      run: cd skills/lake-skill && zip -r ../../dist/skill.zip . -x "*.pyc" -x "__pycache__/*"

    - name: Generate checksums
      run: sha256sum dist/skill.zip > dist/skill.zip.sha256

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        files: |
          dist/skill.zip
          dist/skill.zip.sha256
        fail_on_unmatched_files: true
        overwrite_files: true
        generate_release_notes: true
